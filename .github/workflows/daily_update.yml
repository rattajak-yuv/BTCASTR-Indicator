name: Daily Astro Update

on:
  schedule:
    - cron: "10 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate astro score
        run: python generate_astro_score.py

      - name: Optimize model v2
        run: python optimize_model_v2.py
      
      - name: Build ML dataset
        run: python build_ml_dataset.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bitcoin_astro_daily_score.csv data/model_optimization_v2_results.csv data/astro_aspects_raw.csv data/ml_dataset.csv
          git diff --staged --quiet || git commit -m "daily data update"
          git push
